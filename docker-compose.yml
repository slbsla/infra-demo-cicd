version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"     # Interface web Jenkins
      - "50000:50000"   # Port agents Jenkins (JNLP)
    volumes:
      - jenkins_home:/var/jenkins_home          # Données persistantes Jenkins
      - /var/run/docker.sock:/var/run/docker.sock  # Accès Docker depuis Jenkins
      - C:/Data/IA/Infra/Infra/infra-demo-liberty/apps:/liberty-apps  # Dossier dropins Liberty
    environment:
      - JAVA_OPTS=-Duser.timezone=Europe/Paris

volumes:
  jenkins_home:
    driver: local
